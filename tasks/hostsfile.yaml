---
- name: Build hosts file
  ansible.builtin.lineinfile:
    dest: /etc/hosts
    regexp: ".*{{ item }}$"
    line: "{{ hostvars[item].ansible_default_ipv4.address }} {{ item }} {{ item | split('.') | first }}"
    state: present
  when: hostvars[item].ansible_default_ipv4.address is defined
  with_items: '{{ groups["all"] }}'
